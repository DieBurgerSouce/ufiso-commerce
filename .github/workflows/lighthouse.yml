name: Lighthouse

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  lighthouse:
    name: Lighthouse CI (${{ matrix.shop }})
    runs-on: ubuntu-latest

    strategy:
      # Sprint 11 C.4 — beide Storefronts gegen die gleichen Schwellen
      # (perf 0.9 / a11y 0.95 / bp 0.95 / seo 0.95). fail-fast: false damit
      # ein Shop-Fail nicht den anderen abbricht.
      fail-fast: false
      matrix:
        shop:
          - tropfshop
          - hofladen
        include:
          - shop: tropfshop
            workspace: "@ufiso/storefront-tropfshop"
          - shop: hofladen
            workspace: "@ufiso/storefront-hofladen"

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build storefront (${{ matrix.shop }})
        run: pnpm --filter ${{ matrix.workspace }} build

      - name: Run Lighthouse CI (${{ matrix.shop }})
        # `working-directory` setzt das CWD explizit auf die Storefront-App.
        # Sonst legt lhci die `.lighthouseci/`-Reports relativ zum Filter-
        # Process an (Sprint-5-Artifact-Bug, Sprint 8 D4) — der Upload-Step
        # findet den Folder dann nicht. lhci autorun startet `next start`
        # selbst (siehe lighthouserc.json), rennt 3 Audits pro URL und
        # assertet die Schwellen aus dem Config-File.
        # Backend ist NICHT erforderlich — Storefront degraded graceful.
        working-directory: apps/storefront-${{ matrix.shop }}
        run: pnpm lighthouse

      - name: Upload Lighthouse reports (${{ matrix.shop }})
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports-${{ matrix.shop }}
          path: apps/storefront-${{ matrix.shop }}/.lighthouseci/
          # `.lighthouseci/` ist eine dot-Directory — seit upload-artifact@v4
          # werden hidden Files per Default ausgeschlossen (Sprint-10 A.5).
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7
