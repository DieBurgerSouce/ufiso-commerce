# Lokale Dev-Infrastruktur fuer das Medusa-Backend.
# Prod laeuft auf Neon EU (Postgres) — siehe Vault: Production-Datenbank.md
services:
  postgres:
    image: postgres:16-alpine
    container_name: ufiso-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa
      POSTGRES_DB: medusa
    ports:
      - "15432:5432"
    volumes:
      - ufiso_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ufiso-redis
    restart: unless-stopped
    ports:
      - "16379:6379"

volumes:
  ufiso_pgdata:
